<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 备份管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen text-white">
    <div id="app" class="max-w-7xl mx-auto p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    OpenClaw 备份管理系统
                </h1>
                <p class="text-slate-400 mt-1">自动备份 · GitHub 云同步 · 一键恢复</p>
            </div>
            <div class="flex gap-2">
                <button onclick="showView('dashboard')" id="btn-dashboard" class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium">仪表盘</button>
                <button onclick="showView('backups')" id="btn-backups" class="px-4 py-2 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-600">备份列表</button>
                <button onclick="showView('logs')" id="btn-logs" class="px-4 py-2 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-600">日志</button>
            </div>
        </div>

        <!-- Message -->
        <div id="message" class="hidden mb-4 p-4 rounded-lg"></div>

        <!-- Loading -->
        <div id="loading" class="hidden mb-4">
            <div class="h-1 bg-slate-700 rounded overflow-hidden">
                <div class="h-full bg-blue-500 animate-pulse w-full"></div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-slate-800/50 rounded-xl p-6 mb-8">
            <div class="flex flex-wrap gap-4">
                <button onclick="doBackup()" id="btn-backup" class="px-6 py-3 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-500 transition">
                    💾 立即备份
                </button>
                <button onclick="doRestore('latest')" id="btn-restore-latest" class="px-6 py-3 rounded-lg bg-green-600 text-white font-medium hover:bg-green-500 transition">
                    🔄 恢复最新
                </button>
                <button onclick="refreshAll()" class="px-6 py-3 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-600 transition">
                    🔃 刷新状态
                </button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="view">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-slate-800/50 rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">备份总数</p>
                            <p id="backup-count" class="text-3xl font-bold">-</p>
                        </div>
                        <div class="text-4xl opacity-50">💾</div>
                    </div>
                </div>
                <div class="bg-slate-800/50 rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">最新备份</p>
                            <p id="latest-backup" class="text-lg font-semibold truncate">-</p>
                        </div>
                        <div class="text-4xl opacity-50">📅</div>
                    </div>
                </div>
                <div class="bg-slate-800/50 rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">OpenClaw 状态</p>
                            <p id="openclaw-status" class="text-lg font-semibold">-</p>
                        </div>
                        <div class="text-4xl opacity-50">🖥️</div>
                    </div>
                </div>
                <div class="bg-slate-800/50 rounded-xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">存储占用</p>
                            <p id="storage-size" class="text-lg font-semibold">-</p>
                        </div>
                        <div class="text-4xl opacity-50">📦</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Backups View -->
        <div id="view-backups" class="view hidden">
            <div class="bg-slate-800/50 rounded-xl overflow-hidden">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="text-xl font-bold">备份列表</h2>
                    <button onclick="doBackup()" class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-500">
                        💾 立即备份
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-700/50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-medium text-slate-300">文件名</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-slate-300">大小</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-slate-300">修改时间</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-slate-300">操作</th>
                            </tr>
                        </thead>
                        <tbody id="backups-tbody" class="divide-y divide-slate-700">
                            <tr><td colspan="4" class="px-4 py-8 text-center text-slate-400">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Logs View -->
        <div id="view-logs" class="view hidden">
            <div class="bg-slate-800/50 rounded-xl overflow-hidden">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="text-xl font-bold">操作日志</h2>
                    <button onclick="fetchLogs()" class="px-4 py-2 rounded-lg bg-slate-700 text-white font-medium hover:bg-slate-600">
                        🔄 刷新
                    </button>
                </div>
                <div id="logs-container" class="bg-black/30 p-4 h-[400px] overflow-y-auto scrollbar-thin font-mono text-sm">
                    <p class="text-slate-400 text-center py-8">暂无日志记录</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-slate-500 text-sm mt-8">
            <p>OpenClaw Backup System v1.0 | API: http://localhost:5000</p>
        </div>
    </div>

    <!-- Restore Modal -->
    <div id="modal-restore" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-slate-800 rounded-xl p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">确认恢复</h3>
            <p id="restore-msg" class="text-slate-300 mb-2">确定要恢复此备份吗？</p>
            <p class="text-sm text-yellow-400 mb-4">⚠️ 恢复前会创建临时备份，恢复过程中 OpenClaw 将短暂停止。</p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal('modal-restore')" class="px-4 py-2 rounded-lg bg-slate-700 text-white hover:bg-slate-600">取消</button>
                <button onclick="confirmRestore()" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-500">确认恢复</button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="modal-delete" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-slate-800 rounded-xl p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">确认删除</h3>
            <p id="delete-msg" class="text-slate-300 mb-2">确定要删除此备份吗？</p>
            <p class="text-sm text-red-400 mb-4">⚠️ 此操作不可恢复，请谨慎确认！</p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal('modal-delete')" class="px-4 py-2 rounded-lg bg-slate-700 text-white hover:bg-slate-600">取消</button>
                <button onclick="confirmDelete()" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500">确认删除</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let backups = [];
        let selectedFile = '';

        // Show view
        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('button[id^="btn-"]').forEach(b => {
                b.classList.remove('bg-blue-600');
                b.classList.add('bg-slate-700');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.remove('bg-slate-700');
            document.getElementById(`btn-${view}`).classList.add('bg-blue-600');
        }

        // Show message
        function showMessage(msg, type = 'success') {
            const el = document.getElementById('message');
            el.className = `mb-4 p-4 rounded-lg ${type === 'success' ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'}`;
            el.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg} <button onclick="document.getElementById('message').classList.add('hidden')" class="ml-4 text-sm opacity-70">关闭</button>`;
            el.classList.remove('hidden');
        }

        // Loading
        function setLoading(on) {
            document.getElementById('loading').classList.toggle('hidden', !on);
        }

        // API calls
        async function apiCall(method, endpoint, data = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) opts.body = JSON.stringify(data);
            const res = await fetch(API_BASE + endpoint, opts);
            return res.json();
        }

        // Fetch all data
        async function refreshAll() {
            setLoading(true);
            await Promise.all([fetchStatus(), fetchBackups(), fetchLogs()]);
            setLoading(false);
        }

        // Fetch status
        async function fetchStatus() {
            try {
                const data = await apiCall('GET', '/status');
                document.getElementById('openclaw-status').textContent = data.openclaw?.message || '-';
                document.getElementById('openclaw-status').className = `text-lg font-semibold ${data.openclaw?.running ? 'text-green-400' : 'text-red-400'}`;
            } catch (e) {
                document.getElementById('openclaw-status').textContent = '错误';
            }
        }

        // Fetch backups
        async function fetchBackups() {
            try {
                const data = await apiCall('GET', '/backups');
                backups = data.backups || [];
                updateBackupsUI();
            } catch (e) {
                console.error('Failed to fetch backups', e);
            }
        }

        // Update backups UI
        function updateBackupsUI() {
            const count = backups.length;
            document.getElementById('backup-count').textContent = count;
            document.getElementById('latest-backup').textContent = count > 0 ? backups[0].modified : '暂无';
            document.getElementById('btn-restore-latest').disabled = count === 0;
            document.getElementById('btn-restore-latest').classList.toggle('opacity-50', count === 0);

            // Calculate total size
            const totalSize = backups.reduce((acc, b) => acc + b.size, 0);
            document.getElementById('storage-size').textContent = totalSize > 0 ? (totalSize / 1024 / 1024).toFixed(1) + ' MB' : '0 MB';

            // Update table
            const tbody = document.getElementById('backups-tbody');
            if (backups.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-slate-400">暂无备份记录</td></tr>';
                return;
            }
            tbody.innerHTML = backups.map(b => `
                <tr class="hover:bg-slate-700/30">
                    <td class="px-4 py-3"><code class="bg-slate-700 px-2 py-1 rounded text-sm">${b.name}</code></td>
                    <td class="px-4 py-3">${b.size_human}</td>
                    <td class="px-4 py-3">${b.modified}</td>
                    <td class="px-4 py-3">
                        <div class="flex gap-2">
                            <button onclick="doRestore('${b.name}')" class="px-3 py-1 rounded bg-green-600/50 text-green-400 hover:bg-green-600 text-sm">恢复</button>
                            <button onclick="doDelete('${b.name}')" class="px-3 py-1 rounded bg-red-600/50 text-red-400 hover:bg-red-600 text-sm">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Fetch logs
        async function fetchLogs() {
            try {
                const data = await apiCall('GET', '/logs');
                const logs = data.logs || [];
                const container = document.getElementById('logs-container');
                if (logs.length === 0) {
                    container.innerHTML = '<p class="text-slate-400 text-center py-8">暂无日志记录</p>';
                    return;
                }
                container.innerHTML = logs.map(log => {
                    const match = log.match(/^\[(.*?)\]\s*(.*)$/);
                    if (match) {
                        const [, time, msg] = match;
                        let cls = 'text-slate-300';
                        if (msg.includes('成功') || msg.includes('完成')) cls = 'text-green-400';
                        else if (msg.includes('失败') || msg.includes('错误')) cls = 'text-red-400';
                        return `<div class="py-1"><span class="text-slate-500">[${time}]</span> <span class="${cls}">${msg}</span></div>`;
                    }
                    return `<div class="py-1 text-slate-300">${log}</div>`;
                }).join('');
            } catch (e) {
                console.error('Failed to fetch logs', e);
            }
        }

        // Backup
        async function doBackup() {
            const btn = document.getElementById('btn-backup');
            btn.disabled = true;
            btn.innerHTML = '⏳ 备份中...';
            try {
                const data = await apiCall('POST', '/backup');
                if (data.success) {
                    showMessage('备份成功！');
                    backups = data.backups;
                    updateBackupsUI();
                    fetchLogs();
                } else {
                    showMessage(data.message || '备份失败', 'error');
                }
            } catch (e) {
                showMessage('备份失败: ' + e.message, 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '💾 立即备份';
        }

        // Restore
        function doRestore(filename) {
            selectedFile = filename;
            document.getElementById('restore-msg').textContent = `确定要恢复备份: ${filename} 吗？`;
            document.getElementById('modal-restore').classList.remove('hidden');
        }

        async function confirmRestore() {
            closeModal('modal-restore');
            try {
                const data = await apiCall('POST', '/restore', { filename: selectedFile });
                if (data.success) {
                    showMessage(`恢复成功！已恢复到 ${selectedFile}`);
                } else {
                    showMessage(data.message || '恢复失败', 'error');
                }
                fetchLogs();
            } catch (e) {
                showMessage('恢复失败: ' + e.message, 'error');
            }
        }

        // Delete
        function doDelete(filename) {
            selectedFile = filename;
            document.getElementById('delete-msg').textContent = `确定要删除备份: ${filename} 吗？`;
            document.getElementById('modal-delete').classList.remove('hidden');
        }

        async function confirmDelete() {
            closeModal('modal-delete');
            try {
                const data = await apiCall('DELETE', `/backup/${selectedFile}`);
                if (data.success) {
                    showMessage(`已删除 ${selectedFile}`);
                    fetchBackups();
                } else {
                    showMessage(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showMessage('删除失败: ' + e.message, 'error');
            }
        }

        // Close modal
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // Auto refresh
        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
